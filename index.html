<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07090f; }
    #root { min-height: 100vh; }
  
  /* Appointments scroll */
  .panel:has(.appt-row) {
    max-height: 365px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .panel:has(.appt-row) .panel-head {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--s1);
  }
  .panel:has(.appt-row) .add-form {
    position: sticky;
    bottom: 0;
    z-index: 2;
    background: var(--s1);
  }
  /* Tasks scroll */
  .panel:has(.todo-row) {
    max-height: 335px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .panel:has(.todo-row) .panel-head {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--s1);
  }
  .panel:has(.todo-row) .add-form {
    position: sticky;
    bottom: 0;
    z-index: 2;
    background: var(--s1);
  }
  /* Scrollbar styling */
  .panel:has(.appt-row)::-webkit-scrollbar,
  .panel:has(.todo-row)::-webkit-scrollbar { width: 5px; }
  .panel:has(.appt-row)::-webkit-scrollbar-track,
  .panel:has(.todo-row)::-webkit-scrollbar-track { background: transparent; }
  .panel:has(.appt-row)::-webkit-scrollbar-thumb,
  .panel:has(.todo-row)::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  
  /* PokÃ© News */
  .pokenews-panel {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .pokenews-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .pokenews-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted2);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .pokenews-add {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--s1);
  }
  .pokenews-add input {
    flex: 1;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-size: 13px;
    padding: 7px 12px;
    outline: none;
    font-family: var(--sans);
  }
  .pokenews-add input:focus { border-color: var(--border2); }
  .pokenews-add button {
    background: var(--accent, #6366f1);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  .pokenews-add button:hover { opacity: 0.85; }
  .pokenews-list {
    max-height: 240px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .pokenews-list::-webkit-scrollbar { width: 5px; }
  .pokenews-list::-webkit-scrollbar-track { background: transparent; }
  .pokenews-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .pokenews-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .pokenews-row:last-child { border-bottom: none; }
  .pokenews-row:hover { background: var(--s2); }
  .pokenews-row.seen { opacity: 0.45; }
  .pokenews-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.45;
  }
  .pokenews-row.seen .pokenews-text { text-decoration: line-through; }
  .pokenews-seen-box {
    width: 17px;
    height: 17px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .pokenews-seen-box.checked { background: #a78bfa; border-color: #a78bfa; color: #fff; }
  .pokenews-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 3px;
    opacity: 0;
    transition: opacity 0.15s;
    display: flex;
  }
  .pokenews-row:hover .pokenews-del { opacity: 1; }
  .pokenews-del:hover { color: #f87171; }
  .pokenews-empty {
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  </style>

(function() {
  var STORE_KEY   = 'cc:pokenews';
  var MAX_ITEMS   = 100;
  var news        = [];
  var BATCH_SIZE  = 3;
  var CREATORS    = [
    { name: 'PikaPikaPaPa',          handle: 'PikaPikaPaPa' },
    { name: 'VegasCardDex',          handle: 'VegasCardDex' },
    { name: 'Phillips Collectibles', handle: 'PhillipsCollectibles' },
    { name: 'HyperRare TCG',         handle: 'HyperRareTCG' },
    { name: 'PokeTrace',             handle: 'PokeTrace' },
    { name: 'Flowslikewater',        handle: 'Flowslikewater' },
    { name: 'Athlon Sports TCG',     handle: 'AthlonSports' }
  ];

  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(news)); } catch(e){}
  }

  function load() {
    try { var raw = localStorage.getItem(STORE_KEY); if(raw) news = JSON.parse(raw); } catch(e){}
  }

  function render() {
    var list    = document.getElementById('pokenews-list');
    var empty   = document.getElementById('pokenews-empty');
    var counter = document.getElementById('pokenews-counter');
    if (!list) return;
    list.innerHTML = '';
    if (counter) counter.textContent = getTierLabel(news.length);
    if (empty) empty.style.display = news.length ? 'none' : 'block';
    news.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'pokenews-row' + (item.seen ? ' seen' : '');

      var box = document.createElement('div');
      box.className = 'pokenews-seen-box' + (item.seen ? ' checked' : '');
      box.innerHTML = item.seen
        ? '<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="currentColor" stroke-width="2" fill="none"/></svg>'
        : '';
      box.onclick = function() { item.seen = !item.seen; save(); render(); };

      var txt = document.createElement('div');
      txt.className = 'pokenews-text';
      txt.textContent = item.text;

      var del = document.createElement('button');
      del.className = 'pokenews-del';
      del.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>';
      del.onclick = function() { news = news.filter(function(n){ return n !== item; }); save(); render(); };

      row.appendChild(box);
      row.appendChild(txt);
      row.appendChild(del);
      list.appendChild(row);
    });
  }

  function getTierLabel(count) {
    if (!count) return '';
    return count + ' item' + (count !== 1 ? 's' : '');
  }

  function addItem(text) {
    if (!text) return;
    news.unshift({ id: Date.now(), text: text, seen: false });
    if (news.length > MAX_ITEMS) news = news.slice(0, MAX_ITEMS);
    save();
    render();
  }

  // ── Run Morning Market ──────────────────────────────────────────────────
  function runMorningMarket() {
    var btn = document.getElementById('pokenews-run-btn');
    var statusEl = document.getElementById('pokenews-status');
    if (btn && btn.disabled) return;

    // Clear existing news at the start of every run
    news = [];
    save();
    render();

    if (btn) { btn.disabled = true; btn.textContent = '⏳ Running…'; }
    if (statusEl) { statusEl.style.display = 'block'; statusEl.textContent = 'Starting morning market research…'; }

    var batches = [];
    for (var i = 0; i < CREATORS.length; i += BATCH_SIZE) {
      batches.push(CREATORS.slice(i, i + BATCH_SIZE));
    }
    var allResults = [];

    function processBatch(idx) {
      if (idx >= batches.length) {
        finalize(allResults);
        return;
      }
      var batch    = batches[idx];
      var batchNum = idx + 1;
      var total    = batches.length;
      var names    = batch.map(function(c){ return c.name; }).join(', ');
      if (statusEl) statusEl.textContent = 'Batch ' + batchNum + '/' + total + ': ' + names + '…';

      var prompt =
        'You are a Pok\u00e9mon TCG market research assistant. This is batch ' + batchNum + ' of ' + total + '.\n\n' +
        'Search the web for the LATEST Pok\u00e9mon card market intelligence from these YouTube content creators:\n' +
        batch.map(function(c,i){ return (i+1)+'. '+c.name+' (@'+c.handle+')'; }).join('\n') + '\n\n' +
        'For each creator find their most recent video (last 7 days preferred) and extract:\n' +
        '- Which specific cards or sets they recommend as BUY / HOLD / SELL\n' +
        '- Any price targets or market trend observations\n' +
        '- Any sealed product they are bullish or bearish on\n\n' +
        'FORMAT: bulleted list. Each bullet = one actionable insight.\n' +
        'Pattern per bullet: [Creator] \u2014 [Card/Set] \u2014 [BUY|HOLD|SELL] \u2014 [Reason]\n' +
        'Return 3-8 bullets per creator. Skip commentary without actionable data.';

      fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: [{ role: 'user', content: prompt }]
        })
      })
      .then(function(r){ return r.json(); })
      .then(function(data){
        var text = (data.content || [])
          .filter(function(b){ return b.type === 'text'; })
          .map(function(b){ return b.text || ''; })
          .join('\n').trim();
        if (text) {
          text.split('\n')
            .map(function(l){ return l.replace(/^[-\u2022*\d.]+\s*/, '').trim(); })
            .filter(function(l){ return l.length > 20; })
            .forEach(function(line){ allResults.push(line); });
        }
        processBatch(idx + 1);
      })
      .catch(function(err){
        console.error('Batch ' + batchNum + ' error:', err);
        if (statusEl) statusEl.textContent = 'Error on batch ' + batchNum + '. Continuing…';
        processBatch(idx + 1);
      });
    }

    processBatch(0);
  }

  function finalize(results) {
    results.forEach(function(line){ addItem(line); });

    // Download JSON to Downloads folder
    try {
      var payload = { generated: new Date().toISOString(), items: news };
      var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url; a.download = 'morning_market_results.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
    } catch(e){}

    var btn = document.getElementById('pokenews-run-btn');
    var statusEl = document.getElementById('pokenews-status');
    if (btn) { btn.disabled = false; btn.textContent = '\u25b6 Run Morning Market'; }
    if (statusEl) {
      statusEl.textContent = '\u2705 Done \u2014 ' + news.length + ' insights loaded. JSON saved to Downloads.';
      setTimeout(function(){ statusEl.style.display = 'none'; }, 8000);
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────
  function init() {
    load();
    render();

    // Wire up manual add
    var input = document.getElementById('pokenews-input');
    var addBtn = document.getElementById('pokenews-add-btn');
    if (input) {
      input.addEventListener('keydown', function(e){ if(e.key==='Enter'){ addItem(input.value.trim()); input.value=''; } });
    }
    if (addBtn) {
      addBtn.addEventListener('click', function(){ if(input){ addItem(input.value.trim()); input.value=''; } });
    }

    // Wire up Run Morning Market button
    var runBtn = document.getElementById('pokenews-run-btn');
    if (runBtn) {
      runBtn.addEventListener('click', runMorningMarket);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
